<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOICE NEWS IN - NewSin News</title>
    <style>
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Noto Sans Sinhala', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            color: #333;
        }

        /* 1. Header එක ඇලවෙන ආකාරය */
        header {
            background-color: #ffffff;
            padding: 0 2%;
            border-bottom: 3px solid #cc0000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1100;
            height: 120px; /* Header එකේ උස ස්ථාවර කළා */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-left { flex: 1; display: flex; justify-content: flex-start; }
        .header-left img { max-width: 220px; height: auto; }

        .header-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .social-icons { display: flex; gap: 10px; }
        .social-icons a { text-decoration: none; font-size: 13px; font-weight: bold; color: #333; }
        .header-audio-btn {
            background-color: #cc0000;
            color: white !important;
            padding: 5px 12px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
        }

        .header-right { flex: 1; display: flex; justify-content: flex-end; }
        .special-ad-box {
            width: 350px;
            height: 75px;
            border: 1px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 5px;
            background-color: #fffcfc;
        }
        .special-ad-box img { width: 100%; height: 100%; object-fit: cover; }

        /* 2. මෙනු බාර් එක Header එකට පහළින් ඇලවෙන ආකාරය */
        nav {
            background-color: #333;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            position: sticky;
            top: 125px; /* Header එකේ උසට (100px) වඩා මඳක් වැඩියෙන් */
            z-index: 1000;
            width: 100%;
        }

        nav a { color: white; padding: 15px 20px; text-decoration: none; font-size: 15px; transition: 0.3s; }
        nav a:hover { background-color: #cc0000; }

        /* ගලා යන පුවත් තීරුව */
        .ticker-wrap { background: #eee; padding: 10px; overflow: hidden; white-space: nowrap; }
        .ticker { display: inline-block; animation: ticker-anim 25s linear infinite; font-weight: bold; color: #cc0000; }
        @keyframes ticker-anim { 0% { transform: translate(100%, 0); } 100% { transform: translate(-100%, 0); } }

        .container {
            max-width: 100%; 
            margin: 20px auto;
            padding: 25px;
            background-color: #ffffff;
            border-radius: 8px;
        }

        /* පුවත් කොටස් සඳහා ඉහළින් පරතරයක් ලබා දීම */
        .news-section { 
            padding-top: 20px;
            scroll-margin-top: 170px; /* මෙනුවට යට නොවී පුවත් පෙනීමට */
            margin-bottom: 40px; 
        }
        .section-title { color: #cc0000; border-bottom: 2px solid #cc0000; padding-bottom: 10px; margin-bottom: 20px; font-size: 24px; }

        footer { background-color: #333; color: white; padding: 30px; text-align: center; }

        @media (max-width: 850px) {
            header { flex-direction: column; height: auto; padding: 10px; }
            .header-right { margin-top: 10px; justify-content: center; }
            nav { position: relative; top: 0; }
        }
    </style>
</head>
